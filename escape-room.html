<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escape Room Administrasi FAIR MODE</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:#020617;
color:#e2e8f0;
}

header{
text-align:center;
padding:18px;
background:#111827;
font-family:Orbitron;
font-size:22px;
color:#60a5fa;
}

.container{
max-width:1300px;
margin:auto;
padding:15px;
}

.topbar{
display:flex;
gap:10px;
justify-content:space-between;
flex-wrap:wrap;
margin-bottom:15px;
}

.card{
background:#111827;
padding:14px;
border-radius:12px;
border:1px solid #334155;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.bank,.workspace{
background:#111827;
padding:14px;
border-radius:14px;
border:1px solid #334155;
}

.item{
background:#1e293b;
padding:12px;
margin:8px 0;
border-radius:10px;
cursor:grab;
}

.zone{
border:2px dashed #3b82f6;
border-radius:12px;
min-height:70px;
padding:10px;
margin:10px 0;
}

.label{
font-size:12px;
color:#93c5fd;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:600;
}

.check{
background:#16a34a;
color:white;
}

.next{
background:#9333ea;
color:white;
}

.result{
margin-top:15px;
padding:14px;
background:#0b1220;
border-left:4px solid #22c55e;
white-space:pre-line;
}

.story{
margin-bottom:15px;
padding:14px;
background:#0b1220;
border-left:4px solid #3b82f6;
line-height:1.6;
}

.complete{
text-align:center;
padding:50px;
font-size:24px;
color:#4ade80;
}

@media(max-width:900px){
.grid{
grid-template-columns:1fr;
}
}

</style>
</head>
<body>

<header>ESCAPE ROOM ADMINISTRASI — FAIR MODE</header>

<div class="container">

<div class="topbar">
<div class="card">Level: <span id="level">1</span>/10</div>
<div class="card">Timer: <span id="timer">120</span></div>
<div class="card">Score: <span id="score">0</span></div>
<div class="card">Revisi: <span id="retry">0</span></div>
</div>

<div class="story" id="story"></div>

<div class="grid">

<div class="bank">
<h3>ARSIP</h3>
<div id="bank"></div>
</div>

<div class="workspace">

<h3>RUANG SUSUN</h3>

<div class="zone" id="z_kop" ondrop="drop(event)" ondragover="allow(event)">
<div class="label">KOP</div></div>

<div class="zone" id="z_nomor" ondrop="drop(event)" ondragover="allow(event)">
<div class="label">NOMOR</div></div>

<div class="zone" id="z_tanggal" ondrop="drop(event)" ondragover="allow(event)">
<div class="label">TANGGAL</div></div>

<div class="zone" id="z_perihal" ondrop="drop(event)" ondragover="allow(event)">
<div class="label">PERIHAL</div></div>

<div class="zone" id="z_isi" ondrop="drop(event)" ondragover="allow(event)">
<div class="label">ISI</div></div>

<div class="zone" id="z_penutup" ondrop="drop(event)" ondragover="allow(event)">
<div class="label">PENUTUP</div></div>

<div class="zone" id="z_ttd" ondrop="drop(event)" ondragover="allow(event)">
<div class="label">TTD</div></div>

<button class="check" onclick="checkAnswer()">CEK</button>
<button class="next" id="nextBtn" style="display:none" onclick="nextLevel()">LEVEL BERIKUT</button>

<div class="result" id="result"></div>

</div>

</div>
</div>

<script>

const sekolah=["SMPN 1 Bandung","SMA Nusantara","SMK Teknologi"];
const perihal=["Undangan Rapat","Pemberitahuan","Surat Tugas","Undangan Seminar"];
const isi=["Kegiatan resmi sekolah.","Mohon hadir tepat waktu.","Acara wajib diikuti siswa."];
const penutup=["Demikian surat ini.","Atas perhatian terima kasih."];
const jabatan=["Kepala Sekolah","Ketua OSIS","Wakil Kepala"];

const distractors=["Cuaca cerah","Motor baru","Liburan seru","Makan siang"];

let level=1;
let score=0;
let timer=120;
let retry=0;
let interval;

const correct={
z_kop:"kop",
z_nomor:"nomor",
z_tanggal:"tanggal",
z_perihal:"perihal",
z_isi:"isi",
z_penutup:"penutup",
z_ttd:"ttd"
};

function rand(a){
return a[Math.floor(Math.random()*a.length)];
}

function shuffle(a){
return a.sort(()=>Math.random()-0.5);
}

function generate(){

document.getElementById("story").innerText=
"Level "+level+" — Buka ruang administrasi.";

document.getElementById("level").innerText=level;
document.getElementById("retry").innerText=retry;

let items=[

{id:"kop",text:rand(sekolah)},
{id:"nomor",text:"Nomor "+Math.floor(Math.random()*999)},
{id:"tanggal",text:"Bandung "+(1+Math.floor(Math.random()*28))+"/5/2026"},
{id:"perihal",text:rand(perihal)},
{id:"isi",text:rand(isi)},
{id:"penutup",text:rand(penutup)},
{id:"ttd",text:rand(jabatan)}

];

shuffle(distractors).slice(0,3).forEach((d,i)=>{
items.push({id:"fake"+i,text:d});
});

render(shuffle(items));

startTimer();

}

function render(items){

bank.innerHTML="";

items.forEach(i=>{

let d=document.createElement("div");

d.className="item";
d.id=i.id;
d.innerText=i.text;
d.draggable=true;
d.ondragstart=drag;

bank.appendChild(d);

});

}

function allow(e){e.preventDefault();}
function drag(e){e.dataTransfer.setData("text",e.target.id);}

function drop(e){

e.preventDefault();

let id=e.dataTransfer.getData("text");
let item=document.getElementById(id);

if(!e.currentTarget.querySelector(".item"))
e.currentTarget.appendChild(item);

}

function startTimer(){

clearInterval(interval);

timer=120;

interval=setInterval(()=>{

timer--;

document.getElementById("timer").innerText=timer;

if(timer<=0){

clearInterval(interval);

score=Math.max(0,score-5);

result.innerText="Waktu habis! -5 poin";

document.getElementById("score").innerText=score;

}

},1000);

}

function checkAnswer(){

retry++;
document.getElementById("retry").innerText=retry;

let benar=0;

for(let z in correct){

let item=document.getElementById(z).querySelector(".item");

if(item&&item.id===correct[z]) benar++;

}

let levelScore=benar*5;

levelScore+=Math.floor(timer/10);

levelScore-=retry*3;

if(benar===7) levelScore+=10;

if(levelScore<0) levelScore=0;

if(benar===7){

score+=levelScore;

document.getElementById("score").innerText=score;

clearInterval(interval);

result.innerText=
`BERHASIL
Benar: ${benar}/7
Bonus waktu: ${Math.floor(timer/10)}
Penalty revisi: ${retry*3}
Skor level: ${levelScore}`;

nextBtn.style.display="block";

}else{

result.innerText=
`Masih salah
Benar ${benar}/7
Revisi menambah penalty`;

}

}

function nextLevel(){

level++;
retry=0;

document.querySelectorAll(".zone").forEach(z=>{

let i=z.querySelector(".item");
if(i) bank.appendChild(i);

});

nextBtn.style.display="none";

if(level>10){

let rank="Pemula";

if(score>=500) rank="MASTER ADMINISTRASI";
else if(score>=350) rank="ARSIP SENIOR";
else if(score>=200) rank="STAF TU";

document.body.innerHTML=
`
<div class="complete">

🏆 SELESAI

Final Score: ${score}

Rank: ${rank}

</div>
`;

return;
}

generate();

}

generate();

</script>

</body>
</html>
